# Codely Bridge (cn.tuanjie.codely.bridge) remote UPM EditMode test cases
# TUANJIE_VERSION controls engine version per job.

codely_bridge_tests_all:
  name: All Codely Bridge Package Tests
  dependencies:
    - path: .yamato/bridge-tests.yml#codely_bridge_tests_editmode_-_windowseditor
      location: artifacts@proj0-Codely Bridge Tests EditMode - WindowsEditor
    - path: .yamato/bridge-tests.yml#codely_bridge_tests_editmode_-_maceditor_-_silicon
      location: artifacts@proj0-Codely Bridge Tests EditMode - MacEditor - Silicon
    - path: .yamato/bridge-tests.yml#codely_bridge_tests_editmode_-_linuxeditor_ubuntu_24_04
      location: artifacts@proj0-Codely Bridge Tests EditMode - LinuxEditor (Ubuntu 24.04)
  variables:
    TUANJIE_VERSION: 1.9.3

codely_bridge_tests_editmode_-_windowseditor:
  name: Codely Bridge Tests EditMode - WindowsEditor
  agent:
    image: cds-ops/win10-vs2017-300g:stable
    type: Unity::VM::Volc
    flavor: intel.8C16G
  commands:
    - powershell -command "(New-Object Net.WebClient).DownloadFile('https://artifactory-cds.internal.unity.cn:443/artifactory/tools/upm-ci/upm-ci.exe', 'C:\tools\upm-ci.exe')"
    - IF NOT EXIST "C:\cygwin64\bin\mkdir.exe" mkdir -p upm-ci~
    - IF EXIST "C:\cygwin64\bin\mkdir.exe" C:\cygwin64\bin\mkdir.exe -p upm-ci~
    - IF NOT EXIST "C:\cygwin64\bin\mkdir.exe" mkdir -p upm-ci~\ReportedArtifacts
    - IF EXIST "C:\cygwin64\bin\mkdir.exe" C:\cygwin64\bin\mkdir.exe -p upm-ci~\ReportedArtifacts
    - IF EXIST "artifacts@proj0-Pack\upm-ci~\packages\" xcopy /E /I /Y "artifacts@proj0-Pack\upm-ci~\packages\" "upm-ci~\packages\"
    - C:\tools\upm-ci.exe package test --tuanjie-version %TUANJIE_VERSION% --platform editmode --package-path "upm-ci~\packages\%PACKAGE_NAME%.tgz" --artifacts-path upm-ci~/artifacts
  after:
    - IF EXIST "%HOMEDRIVE%%HOMEPATH%\AppData\Local\Tuanjie\Tuanjie.Licensing.Client.log" mv %HOMEDRIVE%%HOMEPATH%\AppData\Local\Tuanjie\Tuanjie.Licensing.Client.log upm-ci~/ReportedArtifacts/. || true
    - IF NOT EXIST "C:\cygwin64\bin\mkdir.exe" mkdir -p upm-ci~/CrashDumps
    - IF EXIST "C:\cygwin64\bin\mkdir.exe" C:\cygwin64\bin\mkdir.exe -p upm-ci~/CrashDumps
    - cp -R C:\CrashDump/* upm-ci~/CrashDumps/. || true
  artifacts:
    build-CrashDumps:
      paths:
        - upm-ci~/CrashDumps/**
    reportedArtifacts:
      paths:
        - upm-ci~/ReportedArtifacts/**
  dependencies:
    - .yamato/upm-ci.yml#pack
  variables:
    TUANJIE_VERSION: 1.9.3
    PACKAGE_NAME: cn.tuanjie.codely.bridge

codely_bridge_tests_editmode_-_maceditor_-_silicon:
  name: Codely Bridge Tests EditMode - MacEditor - Silicon
  agent:
    image: osx_silicon_m4
    type: Unity::VM::Posx
    flavor: m1.mac
  commands:
    - curl --location --request GET "https://artifactory-cds.internal.unity.cn:443/artifactory/tools/upm-ci/upm-ci-mac" --output ~/Downloads/upm-ci && chmod +x ~/Downloads/upm-ci
    - mkdir -p upm-ci~
    - if [ -d "artifacts@proj0-Pack/upm-ci~/packages" ]; then cp -R "artifacts@proj0-Pack/upm-ci~/packages" "upm-ci~/"; fi
    - mkdir -p upm-ci~/ReportedArtifacts
    - ~/Downloads/upm-ci package test --tuanjie-version $TUANJIE_VERSION --platform editmode --package-path "upm-ci~/packages/$PACKAGE_NAME.tgz" --artifacts-path upm-ci~/artifacts
  after:
    - mv $HOME/buildTemp/ReportedArtifact* upm-ci~/ReportedArtifacts/. || true
    - if [ -f "$HOME/Library/Logs/Tuanjie/Tuanjie.Licensing.Client.log" ]; then mv $HOME/Library/Logs/Tuanjie/Tuanjie.Licensing.Client.log upm-ci~/ReportedArtifacts/. || true; fi
    - mkdir -p upm-ci~/CrashDumps
    - sudo cp -R /Library/Logs/CrashReporter/* upm-ci~/CrashDumps/. || true
    - sudo chown -R $USER:staff upm-ci~/CrashDumps/ || true
    - chmod -R 755 $HOME/Library/Logs/DiagnosticReports || true
    - if [ "$YAMATO_COMMAND_BLOCK_SUCCESS" == "0" ]; then for f in `find . -name AssetImportWorker*.log`; do rsync --relative `echo $f | sed s@/@/./@7` upm-ci~/ReportedArtifacts/; done || true; fi
    - if [ -d "~/Library/Logs/DiagnosticReports" ]; then cp -r "~/Library/Logs/DiagnosticReports" "copied/Library/Logs/DiagnosticReports"; fi
  artifacts:
    build-CrashDumps:
      paths:
        - upm-ci~/CrashDumps/**
    reportedArtifacts:
      paths:
        - upm-ci~/ReportedArtifacts/**
  dependencies:
    - .yamato/upm-ci.yml#pack
  variables:
    TUANJIE_VERSION: 1.9.3
    PACKAGE_NAME: cn.tuanjie.codely.bridge

codely_bridge_tests_editmode_-_linuxeditor_ubuntu_24_04:
  name: Codely Bridge Tests EditMode - LinuxEditor (Ubuntu 24.04)
  agent:
    image: cds-ops/ubuntu24
    type: Unity::VM::Volc
    flavor: amd.16C32G
  commands:
    - curl --location --request GET "https://artifactory-cds.internal.unity.cn:443/artifactory/tools/upm-ci/upm-ci-linux" --output ~/Downloads/upm-ci && chmod +x ~/Downloads/upm-ci
    - mkdir -p upm-ci~
    - if [ -d "artifacts@proj0-Pack/upm-ci~/packages" ]; then cp -R "artifacts@proj0-Pack/upm-ci~/packages" "upm-ci~/"; fi
    - mkdir -p upm-ci~/ReportedArtifacts
    - ~/Downloads/upm-ci package test --tuanjie-version $TUANJIE_VERSION --platform editmode --package-path "upm-ci~/packages/$PACKAGE_NAME.tgz" --artifacts-path upm-ci~/artifacts
  after:
    - mv $HOME/buildTemp/ReportedArtifact* upm-ci~/ReportedArtifacts/. || true
    - if [ -f "$HOME/.config/tuanjie/Tuanjie/Tuanjie.Licensing.Client.log" ]; then mv $HOME/.config/tuanjie/Tuanjie/Tuanjie.Licensing.Client.log upm-ci~/ReportedArtifacts/. || true; fi
    - if [ -f "$HOME/.local/share/tuanjie/Tuanjie/Tuanjie.Licensing.Client.log" ]; then mv $HOME/.local/share/tuanjie/Tuanjie/Tuanjie.Licensing.Client.log upm-ci~/ReportedArtifacts/. || true; fi
    - mkdir -p upm-ci~/CrashDumps
    - mv /var/crash/* upm-ci~/CrashDumps/. || true
    - chmod -R 755 upm-ci~/CrashDumps || true
  artifacts:
    build-CrashDumps:
      paths:
        - upm-ci~/CrashDumps/**
    reportedArtifacts:
      paths:
        - upm-ci~/ReportedArtifacts/**
  dependencies:
    - .yamato/upm-ci.yml#pack
  variables:
    TUANJIE_VERSION: 1.9.3
    PACKAGE_NAME: cn.tuanjie.codely.bridge
